name: Changelog

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  # Serialize runs so concurrent merges don't race on the push.
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the regenerated changelog back to main
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true # needed to push the regenerated changelog

      - name: Generate the changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit and push if changed
        run: |
          if [ -z "$(git status --porcelain CHANGELOG.md)" ]; then
            echo "Changelog unchanged; nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add CHANGELOG.md
          git commit -m 'chore: update changelog'
          git pull --rebase
          git push
